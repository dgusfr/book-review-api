services:
  web:
    build: .
    container_name: bookly-api
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/bookly
      REDIS_URL: redis://redis:6379/0
      DOMAIN: localhost:8000
    depends_on:
      - db
      - redis

  celery:
    build: .
    container_name: bookly-celery
    command: celery -A src.core.tasks.celery_app.c_app worker --loglevel=info
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/bookly
      REDIS_URL: redis://redis:6379/0
      DOMAIN: localhost:8000
    depends_on:
      - redis
      - db

  db:
    image: postgres:15-alpine
    container_name: bookly-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bookly
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: bookly-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data:
